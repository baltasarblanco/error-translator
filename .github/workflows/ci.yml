name: Python CI/CD

# 1. Only trigger when a Pull Request targeting 'master' is closed
on:
  pull_request:
    types: [closed]
    branches: [ "master" ]

jobs:
  test-and-publish:
    # 2. Only run this job if the closed PR was actually MERGED
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added 'build' and 'twine' for packaging and uploading to PyPI
        pip install pytest build twine
        pip install -e .

    - name: Run Pytest
      run: |
        pytest

    - name: Build the package
      run: |
        # This reads your pyproject.toml and creates the /dist folder
        python -m build

    - name: Publish to PyPI
      env:
        # 3. Securely authenticate with PyPI using GitHub Secrets
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        # Upload the compiled packages to PyPI
        twine upload dist/*